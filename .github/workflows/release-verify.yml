name: tgr-dist-release-verify

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to validate, for example v0.1.0
        required: true
        type: string

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve release metadata
        id: meta
        env:
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag_name="$MANUAL_TAG"
          component="${GITHUB_REPOSITORY#*/tgr_}"
          echo "tag=$tag_name" >> "$GITHUB_OUTPUT"
          echo "component=$component" >> "$GITHUB_OUTPUT"

      - name: Validate mirrored release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.meta.outputs.tag }}
          EXPECTED_COMPONENT: ${{ steps.meta.outputs.component }}
        run: |
          set -euo pipefail
          mkdir -p downloaded extracted

          gh release download "${TAG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "manifest.json" \
            --pattern "SHA256SUMS.txt" \
            --dir downloaded \
            --clobber

          manifest_component="$(jq -r '.component' downloaded/manifest.json)"
          manifest_mode="$(jq -r '.mode' downloaded/manifest.json)"
          manifest_source_repo="$(jq -r '.sourceRepo' downloaded/manifest.json)"
          bundle_count="$(jq '.bundles | length' downloaded/manifest.json)"

          case "$EXPECTED_COMPONENT" in
            server) expected_source_repo="JiepengTan/tg_server" ;;
            engine) expected_source_repo="JiepengTan/tg_engine" ;;
            config) expected_source_repo="JiepengTan/tg_config" ;;
            codegen) expected_source_repo="JiepengTan/tg_codegen" ;;
            *)
              echo "Unsupported component: $EXPECTED_COMPONENT" >&2
              exit 1
              ;;
          esac

          test "$manifest_mode" = "release"
          test "$manifest_component" = "$EXPECTED_COMPONENT"
          test "$manifest_source_repo" = "$expected_source_repo"
          test "$bundle_count" -eq 1
          test "$(jq '[.bundles[].name] | unique | length' downloaded/manifest.json)" -eq "$bundle_count"

          zip_name="$(jq -r '.bundles[0].name' downloaded/manifest.json)"
          bundle_os="$(jq -r '.bundles[0].os' downloaded/manifest.json)"
          bundle_arch="$(jq -r '.bundles[0].arch' downloaded/manifest.json)"
          validation_type="$(jq -r '.bundles[0].validation.type' downloaded/manifest.json)"

          test "$zip_name" = "config-any-any.zip"
          test "$bundle_os" = "any"
          test "$bundle_arch" = "any"
          test "$validation_type" = "bundle-entry-exists"
          test -n "$zip_name"

          gh release download "${TAG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${zip_name}" \
            --dir downloaded \
            --clobber

          if command -v sha256sum >/dev/null 2>&1; then
            checksum_cmd=(sha256sum -c SHA256SUMS.txt)
          else
            checksum_cmd=(shasum -a 256 -c SHA256SUMS.txt)
          fi

          (
            cd downloaded
            "${checksum_cmd[@]}"
          )

          extract_dir="extracted/${bundle_os}-${bundle_arch}"
          unzip -oq "downloaded/${zip_name}" -d "${extract_dir}"

          while IFS= read -r validation_path; do
            test -f "${extract_dir}/${validation_path}"
          done < <(jq -r '.bundles[0].validation.paths[]' downloaded/manifest.json)

          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" > downloaded/release.json
          browser_url="$(jq -r --arg zipName "$zip_name" '.assets[] | select(.name == $zipName) | .browser_download_url' downloaded/release.json)"
          test -n "$browser_url"
          curl -fsSL -o "/tmp/${zip_name}" "${browser_url}"
